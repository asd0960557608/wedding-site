<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報名登記 | Yu & 134 Wedding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="index.html">Yu & 134<small>Wedding Day</small></a>
      <button class="nav-toggle" data-nav-toggle aria-label="開啟選單"><span></span><span></span><span></span></button>
      <div class="nav-links" data-nav-links>
        <a href="index.html">首頁</a>
        <a class="active" href="rsvp.html">報名登記</a>
        <a href="seating.html">桌次查詢</a>
        <a href="guide.html">婚禮指引</a>
        <a href="gallery.html">婚紗相簿</a>
        <a href="wishes.html">祝福留言</a>
        <a href="qa.html">Q&A</a>
        <a href="admin.html">後台</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <div class="page-title reveal">
        <span class="eyebrow">Registration</span>
        <h1>報名登記</h1>
        <p>把你的名字交給我們，也把那天的一小段時間留給我們。餐點、同行人數、住宿需求都可以先寫在這裡。</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <form class="form-panel reveal" id="rsvpForm">
          <p class="deadline-note" id="deadlineText"></p>
          <input id="guestId" name="guest_id" type="hidden">
          <input id="registrationMode" name="registration_mode" type="hidden" value="create">
          <div class="form-grid">
            <div class="field">
              <label for="name">姓名</label>
              <input id="name" name="name" type="text" autocomplete="name" required>
            </div>
            <div class="field">
              <label for="phone">手機</label>
              <input id="phone" name="phone" type="tel" autocomplete="tel" required>
            </div>
            <div class="field">
              <label for="attend_status">是否參加</label>
              <select id="attend_status" name="attend_status" required>
                <option value="">請選擇</option>
                <option value="attending">確認參加</option>
                <option value="declined">不克參加</option>
                <option value="pending">尚未確定</option>
              </select>
            </div>
            <div class="field">
              <label for="guest_count">參加人數</label>
              <input id="guest_count" name="guest_count" type="number" min="1" max="10" value="1" required>
            </div>
            <div class="field">
              <label for="meal_type">餐點偏好</label>
              <select id="meal_type" name="meal_type">
                <option value="葷食">葷食</option>
                <option value="素食">素食</option>
              </select>
            </div>
            <div class="field">
              <label for="group_name">關係分組</label>
              <select id="group_name" name="group_name">
                <option value="">請選擇</option>
                <option value="男方親友">男方親友</option>
                <option value="女方親友">女方親友</option>
                <option value="同事">同事</option>
                <option value="同學">同學</option>
                <option value="朋友">朋友</option>
                <option value="其他">其他</option>
              </select>
            </div>
            <div class="field">
              <label for="child_count">兒童椅數量</label>
              <input id="child_count" name="child_count" type="number" min="0" max="10" value="0">
            </div>
            <div class="field">
              <label for="hotel_needed">是否有住宿需求</label>
              <select id="hotel_needed" name="hotel_needed">
                <option value="no">暫不需要</option>
                <option value="yes">需要，想收到方案資訊</option>
                <option value="maybe">還不確定，先幫我留意</option>
              </select>
            </div>
            <div class="field">
              <label for="hotel_guest_count">住宿人數</label>
              <input id="hotel_guest_count" name="hotel_guest_count" type="number" min="0" max="10" value="0">
            </div>
            <div class="field full">
              <label for="special_need">特殊需求</label>
              <input id="special_need" name="special_need" type="text" placeholder="例如孕婦、輪椅、長輩靠走道、過敏等">
            </div>
            <div class="field full">
              <label for="note">備註</label>
              <textarea id="note" name="note" placeholder="例如兒童椅、特殊飲食需求、同行家人姓名等"></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn secondary" id="lookupRegistration" type="button">查詢既有登記</button>
            <button class="btn" id="submitRegistration" type="submit">送出登記</button>
            <span class="spinner" id="formSpinner"></span>
          </div>
          <div class="notice" id="formNotice"></div>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">Thank you for celebrating with us</footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/rsvp.js"></script>
</body>
</html>
