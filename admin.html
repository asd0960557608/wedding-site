<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理 | Yu & 134 Wedding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="index.html">Yu & 134<small>Wedding Day</small></a>
      <button class="nav-toggle" data-nav-toggle aria-label="開啟選單"><span></span><span></span><span></span></button>
      <div class="nav-links" data-nav-links>
        <a href="index.html">首頁</a>
        <a href="rsvp.html">報名登記</a>
        <a href="seating.html">桌次查詢</a>
        <a href="guide.html">婚禮指引</a>
        <a class="active" href="admin.html">後台</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <div class="page-title reveal">
        <span class="eyebrow">Admin</span>
        <h1>賓客管理</h1>
        <p>查看報名登記資料，搜尋賓客，並更新桌號與出席狀態。</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="admin-panel reveal">
          <div class="admin-toolbar">
            <input id="adminSearch" type="search" placeholder="搜尋姓名、手機、桌號或備註">
            <button class="btn secondary" id="refreshGuests" type="button">重新整理</button>
          </div>
          <div class="form-actions">
            <span class="spinner" id="adminSpinner"></span>
          </div>
          <div class="notice" id="adminNotice"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>姓名</th>
                  <th>手機</th>
                  <th>出席狀態</th>
                  <th>人數</th>
                  <th>餐點</th>
                  <th>桌號</th>
                  <th>備註</th>
                  <th>建立時間</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="guestTableBody">
                <tr><td colspan="9">資料讀取中。</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">Wedding admin</footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
