<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>祝福留言牆 | Yu & 134 Wedding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="index.html">Yu & 134<small>Wedding Day</small></a>
      <button class="nav-toggle" data-nav-toggle aria-label="開啟選單"><span></span><span></span><span></span></button>
      <div class="nav-links" data-nav-links>
        <a href="index.html">首頁</a>
        <a href="rsvp.html">報名登記</a>
        <a href="seating.html">桌次查詢</a>
        <a href="guide.html">婚禮指引</a>
        <a href="gallery.html">婚紗相簿</a>
        <a class="active" href="wishes.html">祝福留言</a>
        <a href="qa.html">Q&A</a>
        <a href="admin.html">後台</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <div class="page-title reveal">
        <span class="eyebrow">Wishes</span>
        <h1>留一句話給我們</h1>
        <p>不用寫得很正式。可以是一句祝福、一個回憶，或只是提醒我們婚禮當天不要哭太慘。</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <form class="form-panel reveal" id="wishForm">
          <div class="form-grid">
            <div class="field">
              <label for="wishName">你的名字</label>
              <input id="wishName" name="name" type="text" required>
            </div>
            <div class="field">
              <label for="wishPublic">是否公開在留言牆</label>
              <select id="wishPublic" name="is_public">
                <option value="true">可以公開，給大家一起看</option>
                <option value="false">只想悄悄留給新人</option>
              </select>
            </div>
            <div class="field full">
              <label for="wishMessage">祝福留言</label>
              <textarea id="wishMessage" name="message" placeholder="寫下你想對 Yu & 134 說的話" required></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn" type="submit">送出祝福</button>
            <span class="spinner" id="wishSpinner"></span>
          </div>
          <div class="notice" id="wishNotice"></div>
        </form>

        <div class="section-title reveal wishes-heading">
          <span class="eyebrow">Messages</span>
          <h2>大家留下的溫柔</h2>
        </div>
        <div class="wish-wall" id="wishWall">
          <p class="muted-text">留言讀取中。</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">謝謝你，把祝福放在這裡。</footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/wishes.js"></script>
</body>
</html>
